parameters:
  - name: repository
    type: string
    default: self
    displayName: 'Repository to scan (use "self" or a resources alias)'
  - name: workingDirectory
    type: string
    default: '.'
    displayName: 'Path to the directory containing the Go module (go.mod)'


trigger:
- none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'dependency-track'

steps:
- checkout: ${{ parameters.repository }}

- task: GoTool@0
  inputs:
    version: '1.23'
  displayName: 'Install Go'

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: npm install -g @cyclonedx/cdxgen
  displayName: 'Install cdxgen'

- script: cdxgen -t go --spec-version 1.5 -o '$(Agent.TempDirectory)/bom.json' .
  displayName: 'Create Go provider SBOM'
  workingDirectory: ${{ parameters.workingDirectory }}

- task: upload-bom-dtrack@1
  displayName: 'Upload SBOM to Dependency-Track'
  inputs:
    bomFilePath: '$(Agent.TempDirectory)/bom.json'
    dtrackProjId: '$(PROVIDERS_PROJ_ID)'
    dtrackAPIKey: '$(INFRA_DTRACK_API_KEY)'
    dtrackURI: '$(DTRACK_URI)'
    dtrackProjAutoCreate: false
    thresholdAction: 'warn'
    thresholdCritical: 0
    thresholdHigh: 5
